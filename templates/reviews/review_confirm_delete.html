{% extends 'base.html' %}
{% block title %}Видалити рецензію{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2>Підтвердьте видалення</h2>
        <p>Ви дійсно хочете видалити рецензію "{{ object.title }}"?</p>
        <form method="post">
          {% csrf_token %}
          <button class="btn btn-danger" type="submit">Видалити</button>
          <a class="btn btn-secondary" href="{{ object.book.get_absolute_url }}">Скасувати</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
